services:
  authelia:
    image: authelia/authelia:4.39.8
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET: ${AUTHELIA_JWT_SECRET}
      AUTHELIA_SESSION_SECRET: ${AUTHELIA_SESSION_SECRET}
      AUTHELIA_STORAGE_ENCRYPTION_KEY: ${AUTHELIA_STORAGE_ENCRYPTION_KEY}
    volumes:
      - ./authelia/configuration.yml:/config/configuration.yml:ro
      - ./users_database.yml:/config/users_database.yml:ro
      - authelia-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9091/api/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - controlplane

volumes:
  authelia-data:

networks:
  controlplane:
    external: true
    name: jcn-controlplane

